<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPulse - Healthcare Governance Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F1F5F9;color:#1E293B;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:4px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:#94A3B8;transition:all .15s;white-space:nowrap}
.nav-link:hover{background:rgba(255,255,255,.06);color:#CBD5E1}
.nav-link.active{background:rgba(99,102,241,.2);color:#A5B4FC}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.04em}
.kpi-card{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.risk-track{background:#E2E8F0;border-radius:99px;height:6px;overflow:hidden;flex:1}
.risk-fill{height:100%;border-radius:99px;transition:width .6s ease}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:40;backdrop-filter:blur(2px)}
.drawer{position:fixed;right:0;top:0;bottom:0;width:560px;background:#fff;z-index:50;box-shadow:-6px 0 36px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:640px){.drawer{width:100%}}
.drawer-body{flex:1;overflow-y:auto;padding:24px}
.fade{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:sl .22s ease}
@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748B;border-bottom:2px solid #F1F5F9;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
tr.clickable:hover td{background:#F8FAFC;cursor:pointer}
input,select{font-family:inherit;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;color:#1E293B}
input:focus,select:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
button{font-family:inherit;cursor:pointer}
.btn-primary{background:#6366F1;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;transition:background .15s,transform .1s}
.btn-primary:hover{background:#4F46E5}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:#F1F5F9;color:#475569;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;transition:all .15s}
.btn-secondary:hover{background:#E2E8F0;border-color:#CBD5E1}
.btn-outline{background:transparent;color:#475569;border:1.5px solid #CBD5E1;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:#F1F5F9;border-color:#94A3B8}
.section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:12px}
.chart-container{position:relative;width:100%}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;background:#EEF2FF;color:#4338CA}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

// ─── Palette & utils ──────────────────────────────────────────────────────────
const SEV = {
  P0_CRITICAL:{bg:'#FEE2E2',text:'#991B1B',dot:'#DC2626',label:'P0 Critical',color:'#DC2626'},
  P1_HIGH:    {bg:'#FFEDD5',text:'#9A3412',dot:'#EA580C',label:'P1 High',    color:'#EA580C'},
  P2_MEDIUM:  {bg:'#FEF9C3',text:'#854D0E',dot:'#D97706',label:'P2 Medium',  color:'#D97706'},
  P3_LOW:     {bg:'#DCFCE7',text:'#166534',dot:'#16A34A',label:'P3 Low',     color:'#16A34A'},
};
const PATTERN_LABEL = {
  CREDENTIAL_RISK:'Credential Risk',INSIDER_SNOOPING:'Insider Snooping',
  VOLUME_SPIKE:'Volume Spike',OFF_HOURS:'After-Hours',DATA_EXPORT:'Data Export',
  CROSS_DEPT:'Cross-Department',CROSS_PATIENT:'Cross-Patient',
};
const PATTERN_COLOR = {
  CREDENTIAL_RISK:'#7C3AED',INSIDER_SNOOPING:'#DC2626',VOLUME_SPIKE:'#2563EB',
  OFF_HOURS:'#D97706',DATA_EXPORT:'#0891B2',CROSS_DEPT:'#DB2777',CROSS_PATIENT:'#059669',
};
const ROLE_COLOR = {Physician:'#0891B2',Nursing:'#7C3AED',Billing:'#D97706',Administration:'#6366F1',Other:'#6B7280'};
const TRIAGE_COLOR = {TODAY:'#DC2626',THIS_WEEK:'#EA580C',BACKLOG:'#6366F1',SNOOZED:'#6B7280'};

function inferRole(uid=''){
  const u=uid.toLowerCase();
  if(u.startsWith('dr_'))return 'Physician';
  if(u.startsWith('nurse_'))return 'Nursing';
  if(u.startsWith('billing_'))return 'Billing';
  if(u.includes('admin')||u==='admin')return 'Administration';
  return 'Other';
}
function backendRoleToDisplay(r=''){
  return {clinician:'Physician',nurse:'Nursing',billing:'Billing',admin:'Administration',it:'Other',staff:'Other'}[r]||'Other';
}
const pLabel=p=>PATTERN_LABEL[p]||p;
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'-';
const fmtTime=d=>d?new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'-';
const fmtNum=n=>n==null?'-':Number(n).toLocaleString();

// ─── Auth & API ───────────────────────────────────────────────────────────────
const TOKEN_KEY='tp_token';
const USER_KEY='tp_user';
const getToken=()=>localStorage.getItem(TOKEN_KEY);
const setToken=t=>t?localStorage.setItem(TOKEN_KEY,t):localStorage.removeItem(TOKEN_KEY);
const getSavedUser=()=>{try{return JSON.parse(localStorage.getItem(USER_KEY)||'null')}catch{return null}};
const saveUser=u=>u?localStorage.setItem(USER_KEY,JSON.stringify(u)):localStorage.removeItem(USER_KEY);

async function apiFetch(path,{method='GET',body}={}){
  const tok=getToken();
  const res=await fetch(path,{
    method,
    headers:{'Content-Type':'application/json',...(tok?{Authorization:`Bearer ${tok}`}:{})},
    ...(body?{body:JSON.stringify(body)}:{}),
  });
  if(res.status===401){setToken(null);saveUser(null);window.location.reload();return null}
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

// ─── Report view / PDF helpers ───────────────────────────────────────────────
async function _fetchReportHtml(runId){
  const res=await fetch(`/api/reports/history/${runId}`,{
    headers:{Authorization:`Bearer ${getToken()}`},
  });
  if(res.status===401){setToken(null);window.location.reload();return null;}
  if(!res.ok)throw new Error(await res.text());
  return res.text();
}

async function viewReport(runId){
  try{
    const html=await _fetchReportHtml(runId);
    if(!html)return;
    window.open(URL.createObjectURL(new Blob([html],{type:'text/html'})),'_blank');
  }catch(e){alert('Could not open report: '+e.message);}
}

async function downloadPdf(runId){
  try{
    const html=await _fetchReportHtml(runId);
    if(!html)return;
    const printHtml=html.replace('</head>',
      '<style>@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>'+
      '<script>window.addEventListener("load",function(){setTimeout(window.print,400)});<\/script></head>');
    window.open(URL.createObjectURL(new Blob([printHtml],{type:'text/html'})),'_blank');
  }catch(e){alert('Could not prepare PDF: '+e.message);}
}

// ─── Chart helpers ────────────────────────────────────────────────────────────
const CHART_DEFAULTS={
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#1E293B',padding:10,cornerRadius:8,titleFont:{size:12,weight:'600'},bodyFont:{size:12}}},
  animation:{duration:600},
};

function DonutChart({data,colors,labels,centerText}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data||data.every(v=>v===0))return;
    inst.current?.destroy();
    inst.current=new Chart(ref.current.getContext('2d'),{
      type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverBorderWidth:0}]},
      options:{...CHART_DEFAULTS,cutout:'68%',
        plugins:{...CHART_DEFAULTS.plugins,
          legend:{display:true,position:'bottom',labels:{boxWidth:10,boxHeight:10,padding:14,font:{size:12},color:'#475569'}},
        }
      },
    });
    return()=>{inst.current?.destroy();inst.current=null};
  },[JSON.stringify(data)]);
  return(
    <div style={{position:'relative'}}>
      <canvas ref={ref} height={220}/>
      {centerText&&<div style={{position:'absolute',top:'38%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:28,fontWeight:700,color:'#1E293B',lineHeight:1}}>{centerText.value}</div>
        <div style={{fontSize:11,color:'#64748B',marginTop:2}}>{centerText.label}</div>
      </div>}
    </div>
  );
}

function HBarChart({labels,values,colors,unit=''}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!labels||labels.length===0)return;
    inst.current?.destroy();
    inst.current=new Chart(ref.current.getContext('2d'),{
      type:'bar',
      data:{labels,datasets:[{data:values,backgroundColor:colors||'#6366F1',borderRadius:6,barThickness:18}]},
      options:{...CHART_DEFAULTS,indexAxis:'y',
        scales:{
          x:{grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:11}},border:{display:false}},
          y:{grid:{display:false},ticks:{color:'#334155',font:{size:12},crossAlign:'far'},border:{display:false}},
        },
        plugins:{...CHART_DEFAULTS.plugins,legend:{display:false},
          tooltip:{...CHART_DEFAULTS.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw}${unit?` ${unit}`:''}`}}
        },
      },
    });
    return()=>{inst.current?.destroy();inst.current=null};
  },[JSON.stringify({labels,values})]);
  return <canvas ref={ref}/>;
}

function VBarChart({labels,values,colors,unit=''}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!labels||labels.length===0)return;
    inst.current?.destroy();
    inst.current=new Chart(ref.current.getContext('2d'),{
      type:'bar',
      data:{labels,datasets:[{data:values,backgroundColor:colors||labels.map((_,i)=>`hsl(${220+i*30},70%,60%)`),borderRadius:7,barThickness:32}]},
      options:{...CHART_DEFAULTS,
        scales:{
          x:{grid:{display:false},ticks:{color:'#334155',font:{size:12}},border:{display:false}},
          y:{grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:11}},border:{display:false}},
        },
        plugins:{...CHART_DEFAULTS.plugins,legend:{display:false},
          tooltip:{...CHART_DEFAULTS.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw}${unit?` ${unit}`:''}`}}
        },
      },
    });
    return()=>{inst.current?.destroy();inst.current=null};
  },[JSON.stringify({labels,values})]);
  return <canvas ref={ref}/>;
}

function LineChart({labels,datasets}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!labels||labels.length===0)return;
    inst.current?.destroy();
    inst.current=new Chart(ref.current.getContext('2d'),{
      type:'line',
      data:{labels,datasets:datasets.map(d=>({...d,tension:.4,pointRadius:4,pointHoverRadius:6,borderWidth:2.5,fill:d.fill!==undefined?d.fill:false}))},
      options:{...CHART_DEFAULTS,
        scales:{
          x:{grid:{display:false},ticks:{color:'#64748B',font:{size:11}},border:{display:false},maxTicksLimit:8},
          y:{grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:11}},border:{display:false},beginAtZero:true},
        },
        plugins:{...CHART_DEFAULTS.plugins,
          legend:{display:datasets.length>1,position:'bottom',labels:{boxWidth:10,boxHeight:10,padding:14,font:{size:12},color:'#475569'}},
        },
      },
    });
    return()=>{inst.current?.destroy();inst.current=null};
  },[JSON.stringify({labels,datasets})]);
  return <canvas ref={ref}/>;
}

function GroupedBarChart({labels,datasets}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!labels||labels.length===0)return;
    inst.current?.destroy();
    inst.current=new Chart(ref.current.getContext('2d'),{
      type:'bar',
      data:{labels,datasets:datasets.map(d=>({...d,borderRadius:5,borderSkipped:false}))},
      options:{...CHART_DEFAULTS,
        scales:{
          x:{grid:{display:false},ticks:{color:'#334155',font:{size:12}},border:{display:false}},
          y:{grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:11}},border:{display:false},beginAtZero:true},
        },
        plugins:{...CHART_DEFAULTS.plugins,
          legend:{display:true,position:'bottom',labels:{boxWidth:10,boxHeight:10,padding:14,font:{size:12},color:'#475569'}},
        },
      },
    });
    return()=>{inst.current?.destroy();inst.current=null};
  },[JSON.stringify({labels,datasets})]);
  return <canvas ref={ref}/>;
}

// ─── UI Primitives ───────────────────────────────────────────────────────────
function Badge({sev}){
  const s=SEV[sev]||{bg:'#F1F5F9',text:'#475569',label:sev};
  return <span className="badge" style={{background:s.bg,color:s.text}}>{s.label}</span>;
}

function PatternBadge({pattern}){
  const color=PATTERN_COLOR[pattern]||'#6B7280';
  return <span className="badge" style={{background:color+'18',color}}>{pLabel(pattern)}</span>;
}

function RoleBadge({role}){
  const color=ROLE_COLOR[role]||'#6B7280';
  return <span className="badge" style={{background:color+'18',color}}>{role}</span>;
}

function StatusDot({ok}){
  return <span style={{width:8,height:8,borderRadius:'50%',background:ok?'#22C55E':'#EF4444',display:'inline-block',boxShadow:`0 0 0 3px ${ok?'#DCFCE7':'#FEE2E2'}`}}/>;
}

function RiskBar({score,color}){
  const c=color||(score>=80?'#DC2626':score>=50?'#EA580C':score>=30?'#D97706':'#16A34A');
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div className="risk-track"><div className="risk-fill" style={{width:`${Math.min(score,100)}%`,background:c}}/></div>
      <span style={{fontSize:12,fontWeight:700,color:c,minWidth:28}}>{score}</span>
    </div>
  );
}

function KpiCard({icon,label,value,sub,color,trend,onClick}){
  return(
    <div className="kpi-card fade" onClick={onClick}
      style={{cursor:onClick?'pointer':'default',transition:'box-shadow .2s,transform .15s'}}
      onMouseEnter={e=>{if(onClick){e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.13)';e.currentTarget.style.transform='translateY(-2px)'}}}
      onMouseLeave={e=>{if(onClick){e.currentTarget.style.boxShadow='';e.currentTarget.style.transform=''}}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:'#64748B',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>{label}</div>
          <div style={{fontSize:30,fontWeight:700,color:'#0F172A',lineHeight:1}}>{value}</div>
          {sub&&<div style={{fontSize:12,color:'#94A3B8',marginTop:6}}>{sub}</div>}
        </div>
        <div style={{width:44,height:44,borderRadius:12,background:color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
          {icon}
        </div>
      </div>
      {trend&&<div style={{marginTop:14,fontSize:11,fontWeight:600,color:trend>0?'#DC2626':'#16A34A'}}>
        {trend>0?'↑':'↓'} {Math.abs(trend)} from last period
      </div>}
      {onClick&&<div style={{marginTop:12,fontSize:11,fontWeight:700,color:color,display:'flex',alignItems:'center',gap:3}}>
        View details <span style={{fontSize:13}}>→</span>
      </div>}
    </div>
  );
}

function ChartCard({title,subtitle,children,actions,onClick}){
  return(
    <div className="card" style={{padding:'20px 24px',cursor:onClick?'pointer':'default',transition:'box-shadow .2s,transform .15s'}}
      onClick={onClick}
      onMouseEnter={e=>{if(onClick){e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.11)';e.currentTarget.style.transform='translateY(-1px)'}}}
      onMouseLeave={e=>{if(onClick){e.currentTarget.style.boxShadow='';e.currentTarget.style.transform=''}}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>{title}</div>
          {subtitle&&<div style={{fontSize:12,color:'#94A3B8',marginTop:2}}>{subtitle}</div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {actions&&<div>{actions}</div>}
          {onClick&&<span style={{fontSize:12,fontWeight:700,color:'#6366F1',whiteSpace:'nowrap'}}>View all →</span>}
        </div>
      </div>
      {children}
    </div>
  );
}

function EmptyChart({message='No data available'}){
  return(
    <div style={{height:180,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:'#94A3B8'}}>
      <span style={{fontSize:28}}>📊</span>
      <span style={{fontSize:13}}>{message}</span>
    </div>
  );
}

function Spinner(){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 0'}}>
      <div style={{width:28,height:28,border:'3px solid #E2E8F0',borderTopColor:'#6366F1',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
const NAV=[
  {key:'dashboard',icon:'⬡',label:'Dashboard'},
  {key:'cases',    icon:'🗂',label:'Cases'},
  {key:'employees',icon:'👥',label:'Employees'},
  {key:'ingestion',icon:'⚡',label:'Ingestion'},
  {key:'reports',  icon:'📄',label:'Reports'},
  {key:'system',   icon:'🔌',label:'Connection'},
];
const ADMIN_NAV=[
  {key:'admin_users',       icon:'👤',label:'Users'},
  {key:'admin_permissions', icon:'🔐',label:'Permission Groups'},
  {key:'admin_privacy',     icon:'🛡',label:'Data Privacy'},
  {key:'admin_settings',    icon:'⚙️',label:'Settings'},
];

function Sidebar({page,setPage,user,onLogout,casesCount}){
  const isAdmin=user?.role==='TRUSTPULSE_ADMIN';
  return(
    <aside style={{width:220,background:'#0F172A',display:'flex',flexDirection:'column',padding:'24px 12px',flexShrink:0,minHeight:'100vh',overflowY:'auto'}}>
      <div style={{padding:'0 6px',marginBottom:32}}>
        <div style={{fontSize:16,fontWeight:800,color:'#F8FAFC',letterSpacing:'-.01em'}}>TrustPulse</div>
        <div style={{fontSize:10,color:'#475569',marginTop:2,letterSpacing:'.06em',textTransform:'uppercase'}}>Governance Platform</div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'#334155',letterSpacing:'.1em',textTransform:'uppercase',padding:'0 10px',marginBottom:8}}>Navigation</div>
      <nav style={{display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(n=>(
          <div key={n.key} className={`nav-link${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
            <span style={{fontSize:15}}>{n.icon}</span>
            <span>{n.label}</span>
            {n.key==='cases'&&casesCount>0&&(
              <span style={{marginLeft:'auto',background:'#6366F1',color:'#fff',borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:700}}>{casesCount}</span>
            )}
          </div>
        ))}
      </nav>
      {isAdmin&&(
        <>
          <div style={{fontSize:10,fontWeight:700,color:'#334155',letterSpacing:'.1em',textTransform:'uppercase',padding:'0 10px',marginTop:20,marginBottom:8}}>Administration</div>
          <nav style={{display:'flex',flexDirection:'column',gap:2}}>
            {ADMIN_NAV.map(n=>(
              <div key={n.key} className={`nav-link${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
                <span style={{fontSize:15}}>{n.icon}</span>
                <span>{n.label}</span>
              </div>
            ))}
          </nav>
        </>
      )}
      <div style={{flex:1}}/>
      <div style={{borderTop:'1px solid #1E293B',paddingTop:16,marginTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,background:'rgba(255,255,255,.04)'}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:'#6366F1',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>
            {(user?.display_name||user?.email||'?')[0].toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:'#E2E8F0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.display_name||user?.email}</div>
            <div style={{fontSize:10,color:'#64748B',marginTop:1}}>{user?.role?.replace(/_/g,' ')}</div>
          </div>
        </div>
        <button className="nav-link" style={{width:'100%',marginTop:4,border:'none',background:'transparent'}} onClick={onLogout}>
          <span>🚪</span><span>Sign out</span>
        </button>
      </div>
    </aside>
  );
}

// ─── Case Drawer ──────────────────────────────────────────────────────────────
function CaseDrawer({caseId,user,onClose,onDisposed}){
  const [detail,setDetail]=useState(null);
  const [loading,setLoading]=useState(true);
  const [disposition,setDisposition]=useState('');
  const [notes,setNotes]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [disposed,setDisposed]=useState(false);
  const [reqReason,setReqReason]=useState('');
  const [reqSubmitting,setReqSubmitting]=useState(false);
  const [reqMsg,setReqMsg]=useState(null);
  const [showReqForm,setShowReqForm]=useState(false);

  useEffect(()=>{
    if(!caseId)return;
    setLoading(true);setDetail(null);setDisposed(false);setReqMsg(null);setShowReqForm(false);
    apiFetch(`/api/cases/${caseId}`).then(d=>{setDetail(d);setLoading(false)}).catch(()=>setLoading(false));
  },[caseId]);

  async function submitAccessRequest(){
    if(!reqReason.trim()){return;}
    setReqSubmitting(true);
    const r=await apiFetch('/api/privacy/request',{method:'POST',body:{reason:reqReason.trim()}});
    setReqSubmitting(false);
    if(r?.id){setReqMsg({m:'Request submitted - an admin will review it.',ok:true});setShowReqForm(false);setReqReason('');}
    else if(r?.detail?.includes('pending')){setReqMsg({m:'You already have a pending request.',ok:false});}
    else setReqMsg({m:'Failed to submit request.',ok:false});
  }

  async function submitDisposition(){
    if(!disposition)return;
    setSubmitting(true);
    try{
      await apiFetch(`/api/cases/${caseId}/disposition`,{method:'POST',body:{action:disposition,notes}});
      const updated=await apiFetch(`/api/cases/${caseId}`);
      setDetail(updated);
      setDisposed(true);
      onDisposed&&onDisposed(caseId);
    }catch(e){
      try{const j=JSON.parse(e.message);alert('Disposition failed: '+(j.detail||e.message));}
      catch{alert('Disposition failed: '+e.message);}
    }
    setSubmitting(false);
  }

  const canDispose=user?.permissions?.includes('disposition');
  const c=detail;

  return(
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="drawer slide">
        <div style={{padding:'20px 24px',borderBottom:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'.06em'}}>Case Detail</div>
            {c&&<div style={{fontSize:13,fontWeight:600,color:'#475569',marginTop:2,fontFamily:'monospace'}}>{c.case_id?.slice(0,8)}…</div>}
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:'1.5px solid #E2E8F0',background:'#fff',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#64748B'}}>×</button>
        </div>
        <div className="drawer-body">
          {loading&&<Spinner/>}
          {!loading&&!c&&<div style={{color:'#94A3B8',textAlign:'center',padding:'40px 0'}}>Case not found.</div>}
          {c&&(
            <div className="fade">
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:17,fontWeight:700,color:'#0F172A',lineHeight:1.4,marginBottom:12}}>{c.title}</h2>
                <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
                  <Badge sev={c.severity}/>
                  <PatternBadge pattern={c.pattern_type}/>
                  <RoleBadge role={inferRole(c.user_id)}/>
                  {c.breach_risk&&<span className="badge" style={{background:'#FEE2E2',color:'#991B1B'}}>⚠ Breach Risk</span>}
                  {c.is_demo&&<span className="badge" style={{background:'#E0E7FF',color:'#3730A3'}}>Demo</span>}
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                {[
                  {l:'User',v:`${c.user_name} (${c.user_id})`},
                  {l:'Role',v:inferRole(c.user_id)},
                  {l:'Events',v:fmtNum(c.event_count)},
                  {l:'Risk Score',v:null,raw:<RiskBar score={c.risk_score}/>},
                  {l:'Period',v:`${fmtDate(c.date_start)} – ${fmtDate(c.date_end)}`},
                  {l:'Status',v:c.status},
                  {l:'Triage',v:c.triage_bucket?.replace('_',' ')},
                  {l:'Breach Deadline',v:c.breach_deadline?`${c.breach_days_remaining}d remaining`:'-'},
                ].map(({l,v,raw})=>(
                  <div key={l} style={{background:'#F8FAFC',borderRadius:10,padding:'12px 14px'}}>
                    <div style={{fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>{l}</div>
                    {raw||<div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{v}</div>}
                  </div>
                ))}
              </div>

              {c.privacy_masked&&(
                <div style={{background:'#EEF2FF',border:'1px solid #C7D2FE',borderRadius:10,padding:'12px 16px',marginBottom:20}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'#4338CA',marginBottom:4}}>🛡 Data Privacy Active</div>
                      <div style={{fontSize:12,color:'#4338CA',lineHeight:1.5}}>
                        Fields masked: {(c.privacy_fields||[]).join(', ')}. Values appear as ●●●●●●●●. Request access to view actual values.
                      </div>
                      {reqMsg&&<div style={{marginTop:8,fontSize:12,fontWeight:600,color:reqMsg.ok?'#15803D':'#DC2626'}}>{reqMsg.m}</div>}
                    </div>
                    <button onClick={()=>setShowReqForm(s=>!s)} style={{padding:'6px 14px',borderRadius:8,border:'1px solid #6366F1',background:showReqForm?'#6366F1':'transparent',color:showReqForm?'#fff':'#6366F1',cursor:'pointer',fontSize:12,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>
                      {showReqForm?'Cancel':'Request Access'}
                    </button>
                  </div>
                  {showReqForm&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #C7D2FE'}}>
                      <textarea
                        value={reqReason}
                        onChange={e=>setReqReason(e.target.value)}
                        placeholder="Reason for access (e.g. investigating potential breach in case - patient identity required for OCR report)…"
                        rows={3}
                        style={{width:'100%',border:'1.5px solid #C7D2FE',borderRadius:8,padding:'8px 12px',fontSize:12,resize:'vertical',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
                      />
                      <button className="btn-primary" style={{marginTop:8,fontSize:12}} onClick={submitAccessRequest} disabled={reqSubmitting||reqReason.trim().length<10}>
                        {reqSubmitting?'Submitting…':'Submit Request'}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {c.hipaa_provisions?.length>0&&(
                <div style={{marginBottom:20}}>
                  <div className="section-header">HIPAA Provisions</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {c.hipaa_provisions.map(p=><span key={p} className="tag">{p}</span>)}
                  </div>
                </div>
              )}

              {c.recommended_action&&(
                <div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:10,padding:'12px 16px',marginBottom:20}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#9A3412',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Recommended Action</div>
                  <div style={{fontSize:13,fontWeight:600,color:'#7C2D12'}}>{c.recommended_action?.replace(/_/g,' ')}</div>
                </div>
              )}

              {c.fired_rules?.length>0&&(
                <div style={{marginBottom:20}}>
                  <div className="section-header">Rules Fired</div>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {c.fired_rules.map(r=>(
                      <div key={r.rule_id} style={{border:`1px solid ${r.not_evaluated?'#E0E7FF':r.fired?'#FECACA':'#E2E8F0'}`,borderRadius:10,padding:'12px 14px',background:r.not_evaluated?'#EEF2FF':r.fired?'#FFF5F5':'#F8FAFC'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                          <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{r.rule_id} - {r.rule_name}</span>
                          <div style={{display:'flex',gap:6}}>
                            {r.not_evaluated&&<span className="badge" style={{background:'#EEF2FF',color:'#4338CA'}}>Not Evaluated</span>}
                            {r.fired&&!r.not_evaluated&&<span className="badge" style={{background:'#FEE2E2',color:'#991B1B'}}>Fired</span>}
                            {r.confidence&&<span className="badge" style={{background:'#F1F5F9',color:'#475569'}}>{r.confidence}</span>}
                          </div>
                        </div>
                        <div style={{fontSize:12,color:'#475569'}}>{r.description}</div>
                        {r.not_evaluated_reason&&<div style={{fontSize:11,color:'#6366F1',marginTop:4}}>ℹ {r.not_evaluated_reason}</div>}
                        {r.limitations?.length>0&&<div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>Limitations: {r.limitations.join(' · ')}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {c.action_history?.length>0&&(
                <div style={{marginBottom:20}}>
                  <div className="section-header">Action History</div>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {c.action_history.map((a,i)=>(
                      <div key={i} style={{borderLeft:'3px solid #6366F1',paddingLeft:12,paddingBottom:8}}>
                        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:3}}>
                          <span style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{a.action}</span>
                          <span style={{fontSize:11,color:'#94A3B8'}}>{fmtTime(a.created_at)}</span>
                        </div>
                        <div style={{fontSize:11,color:'#64748B'}}>{a.actor_email||'unknown'} ({a.actor_role})</div>
                        {(a.previous_status||a.new_status)&&<div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>{a.previous_status||'?'} → {a.new_status||'?'}</div>}
                        {a.notes&&<div style={{fontSize:11,color:'#475569',marginTop:3,fontStyle:'italic'}}>{a.notes}</div>}
                        <div style={{fontSize:10,color:'#CBD5E1',marginTop:4,fontFamily:'monospace'}}>{a.record_hash?.slice(0,24)}…</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {canDispose&&!disposed&&['OPEN','FOLLOW_UP','ESCALATED'].includes(c.status)&&(
                <div style={{border:'1.5px solid #E2E8F0',borderRadius:12,padding:'16px 18px',marginBottom:20}}>
                  <div className="section-header">Record Disposition</div>
                  <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    <select value={disposition} onChange={e=>setDisposition(e.target.value)} style={{width:'100%'}}>
                      <option value="">Select action…</option>
                      <option value="REVIEWED">Reviewed - no further action</option>
                      <option value="ESCALATED">Escalated to supervisor</option>
                      <option value="DISMISSED">Dismissed</option>
                      <option value="FOLLOW_UP">Follow up required</option>
                      <option value="FALSE_POSITIVE">False positive</option>
                    </select>
                    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder={['DISMISSED','FALSE_POSITIVE','ESCALATED','FOLLOW_UP'].includes(disposition)?'Notes (required for this action)…':'Notes (optional)…'} rows={3} style={{width:'100%',border:'1.5px solid #E2E8F0',borderRadius:8,padding:'8px 12px',fontSize:13,resize:'vertical',fontFamily:'inherit',outline:'none'}}/>
                    <button className="btn-primary" onClick={submitDisposition} disabled={!disposition||submitting}>
                      {submitting?'Saving…':'Record Disposition'}
                    </button>
                  </div>
                </div>
              )}
              {disposed&&<div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:13,color:'#166534',fontWeight:600}}>✓ Disposition recorded</div>}

              <div>
                <button className="btn-secondary" style={{cursor:'pointer'}} onClick={async()=>{
                  const res=await fetch(`/api/evidence/${caseId}`,{headers:{Authorization:`Bearer ${getToken()}`}});
                  if(!res.ok){alert(`Evidence export failed: ${await res.text()}`);return;}
                  const html=await res.text();
                  const url=URL.createObjectURL(new Blob([html],{type:'text/html'}));
                  window.open(url,'_blank');
                }}>
                  📄 Export Evidence Package
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── Dashboard Page ───────────────────────────────────────────────────────────
function DashboardPage({cases,ingestion,system,setPage}){
  const total=cases.length;
  const openCases=useMemo(()=>cases.filter(c=>c.status==='OPEN'),[cases]);
  const critical=useMemo(()=>openCases.filter(c=>c.severity==='P0_CRITICAL'),[openCases]);
  const breach=useMemo(()=>openCases.filter(c=>c.breach_risk),[openCases]);
  const users=useMemo(()=>new Set(openCases.map(c=>c.user_id)).size,[openCases]);
  const eventsStored=ingestion?.total_events_stored||0;

  // Severity breakdown
  const sevCounts=useMemo(()=>{
    const m={P0_CRITICAL:0,P1_HIGH:0,P2_MEDIUM:0,P3_LOW:0};
    openCases.forEach(c=>m[c.severity]=(m[c.severity]||0)+1);
    return m;
  },[openCases]);

  // Pattern breakdown
  const patternCounts=useMemo(()=>{
    const m={};openCases.forEach(c=>{m[c.pattern_type]=(m[c.pattern_type]||0)+1});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[openCases]);

  // Top users by max risk
  const userRisk=useMemo(()=>{
    const m={};
    openCases.forEach(c=>{if(!m[c.user_name]||c.risk_score>m[c.user_name])m[c.user_name]=c.risk_score});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);
  },[openCases]);

  // Triage bucket
  const triageCounts=useMemo(()=>{
    const m={TODAY:0,THIS_WEEK:0,BACKLOG:0};
    openCases.forEach(c=>{m[c.triage_bucket]=(m[c.triage_bucket]||0)+1});
    return m;
  },[openCases]);

  // Role breakdown
  const roleCounts=useMemo(()=>{
    const m={};
    openCases.forEach(c=>{const r=inferRole(c.user_id);m[r]=(m[r]||0)+1});
    return m;
  },[openCases]);

  // Cases by role + severity (grouped bar)
  const roles=Object.keys(ROLE_COLOR);
  const severities=['P0_CRITICAL','P1_HIGH','P2_MEDIUM','P3_LOW'];
  const roleSevData=useMemo(()=>{
    const m={};
    severities.forEach(s=>{ m[s]={};roles.forEach(r=>{m[s][r]=0}) });
    openCases.forEach(c=>{
      const r=inferRole(c.user_id);
      if(m[c.severity])m[c.severity][r]=(m[c.severity][r]||0)+1;
    });
    return m;
  },[openCases]);

  // Ingestion timeline
  const manifests=useMemo(()=>
    [...(ingestion?.manifests||[])].reverse().slice(-12)
  ,[ingestion]);

  const connected=system?.openemr_connection?.connected||false;

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {/* KPI Row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="📋" label="Events Ingested" value={fmtNum(eventsStored)} color="#6366F1"
          onClick={()=>setPage('ingestion')}/>
        <KpiCard icon="🗂" label="Open Cases" value={fmtNum(openCases.length)} color="#2563EB"
          onClick={()=>setPage('cases')}/>
        <KpiCard icon="🔴" label="P0 Critical" value={fmtNum(critical.length)} color="#DC2626"
          onClick={()=>setPage('cases')}/>
        <KpiCard icon="⚠️" label="Breach Risk" value={fmtNum(breach.length)} color="#EA580C"
          onClick={()=>setPage('cases')}/>
        <KpiCard icon="👥" label="Users Under Review" value={fmtNum(users)} color="#7C3AED"
          onClick={()=>setPage('employees')}/>
      </div>

      {/* Row 2: Severity + Pattern */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:16,marginBottom:16}}>
        <ChartCard title="Cases by Severity" subtitle="Open cases breakdown" onClick={()=>setPage('cases')}>
          {openCases.length>0
            ?<DonutChart
               labels={['P0 Critical','P1 High','P2 Medium','P3 Low']}
               data={[sevCounts.P0_CRITICAL,sevCounts.P1_HIGH,sevCounts.P2_MEDIUM,sevCounts.P3_LOW]}
               colors={['#DC2626','#EA580C','#D97706','#16A34A']}
               centerText={{value:openCases.length,label:'Open Cases'}}/>
            :<EmptyChart message="No open cases"/>}
        </ChartCard>
        <ChartCard title="Cases by Pattern Type" subtitle="Distribution of detected risk patterns" onClick={()=>setPage('cases')}>
          {patternCounts.length>0
            ?<VBarChart
               labels={patternCounts.map(([p])=>pLabel(p))}
               values={patternCounts.map(([,v])=>v)}
               colors={patternCounts.map(([p])=>PATTERN_COLOR[p]||'#6B7280')}/>
            :<EmptyChart message="No pattern data"/>}
        </ChartCard>
      </div>

      {/* Row 3: User Risk + Triage */}
      <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:16,marginBottom:16}}>
        <ChartCard title="Top Users by Max Risk Score" subtitle="Highest risk scores per employee" onClick={()=>setPage('employees')}>
          {userRisk.length>0
            ?<HBarChart
               labels={userRisk.map(([name])=>name)}
               values={userRisk.map(([,score])=>score)}
               colors={userRisk.map(([,score])=>score>=80?'#DC2626':score>=50?'#EA580C':score>=30?'#D97706':'#16A34A')}
               unit="pts"/>
            :<EmptyChart message="No user risk data"/>}
        </ChartCard>
        <ChartCard title="Cases by Triage Bucket" subtitle="Urgency classification" onClick={()=>setPage('cases')}>
          {openCases.length>0
            ?<VBarChart
               labels={['Today','This Week','Backlog']}
               values={[triageCounts.TODAY,triageCounts.THIS_WEEK,triageCounts.BACKLOG]}
               colors={['#DC2626','#EA580C','#6366F1']}/>
            :<EmptyChart/>}
        </ChartCard>
      </div>

      {/* Row 4: Role×Severity grouped bar + Ingestion timeline */}
      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:16,marginBottom:16}}>
        <ChartCard title="Cases by Role Group &amp; Severity" subtitle="Grouped breakdown by department" onClick={()=>setPage('cases')}>
          {openCases.length>0
            ?<GroupedBarChart
               labels={roles.filter(r=>roleCounts[r]>0)}
               datasets={severities.map(s=>({
                 label:SEV[s].label,
                 data:roles.filter(r=>roleCounts[r]>0).map(r=>roleSevData[s][r]||0),
                 backgroundColor:SEV[s].color,
               }))}/>
            :<EmptyChart/>}
        </ChartCard>
        <ChartCard title="Role Distribution" subtitle="Cases by department" onClick={()=>setPage('employees')}>
          {openCases.length>0
            ?<DonutChart
               labels={Object.keys(roleCounts)}
               data={Object.values(roleCounts)}
               colors={Object.keys(roleCounts).map(r=>ROLE_COLOR[r]||'#6B7280')}
               centerText={{value:Object.keys(roleCounts).length,label:'Departments'}}/>
            :<EmptyChart/>}
        </ChartCard>
      </div>

      {/* Row 5: Ingestion timeline */}
      <ChartCard title="Ingestion Timeline" subtitle="Events processed per ingestion run" onClick={()=>setPage('ingestion')}>
        {manifests.length>0
          ?<LineChart
             labels={manifests.map(m=>fmtTime(m.started_at))}
             datasets={[{
               label:'Events Ingested',
               data:manifests.map(m=>m.inserted_count||0),
               borderColor:'#6366F1',
               backgroundColor:'rgba(99,102,241,.1)',
               fill:true,
             },{
               label:'Source Rows',
               data:manifests.map(m=>m.source_row_count||0),
               borderColor:'#0891B2',
               backgroundColor:'transparent',
             }]}/>
          :<EmptyChart message="No ingestion runs yet"/>}
      </ChartCard>
    </div>
  );
}

// ─── Cases Page ───────────────────────────────────────────────────────────────
function CasesPage({cases,user,onCaseClick}){
  const [search,setSearch]=useState('');
  const [sevFilter,setSevFilter]=useState('');
  const [patFilter,setPatFilter]=useState('');
  const [triageFilter,setTriageFilter]=useState('');
  const [statusFilter,setStatusFilter]=useState('OPEN');
  const [groupBy,setGroupBy]=useState('none');
  const [sortBy,setSortBy]=useState('risk_score');
  const [sortDir,setSortDir]=useState('desc');

  const filtered=useMemo(()=>{
    let c=[...cases];
    if(search)c=c.filter(x=>(x.user_name||'').toLowerCase().includes(search.toLowerCase())||(x.title||'').toLowerCase().includes(search.toLowerCase()));
    if(sevFilter)c=c.filter(x=>x.severity===sevFilter);
    if(patFilter)c=c.filter(x=>x.pattern_type===patFilter);
    if(triageFilter)c=c.filter(x=>x.triage_bucket===triageFilter);
    if(statusFilter)c=c.filter(x=>x.status===statusFilter);
    c.sort((a,b)=>{
      let av=a[sortBy],bv=b[sortBy];
      if(typeof av==='string')av=av.toLowerCase(),bv=bv.toLowerCase();
      return sortDir==='asc'?av>bv?1:-1:av<bv?1:-1;
    });
    return c;
  },[cases,search,sevFilter,patFilter,triageFilter,statusFilter,sortBy,sortDir]);

  const grouped=useMemo(()=>{
    if(groupBy==='none')return[{key:'All Cases',items:filtered}];
    const m={};
    filtered.forEach(c=>{
      const k=groupBy==='role'?inferRole(c.user_id):groupBy==='severity'?c.severity:groupBy==='pattern'?c.pattern_type:groupBy==='user'?c.user_name:c.triage_bucket;
      if(!m[k])m[k]=[];m[k].push(c);
    });
    return Object.entries(m).sort((a,b)=>b[1].length-a[1].length).map(([key,items])=>({key,items}));
  },[filtered,groupBy]);

  function toggleSort(col){
    if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortBy(col);setSortDir('desc');}
  }
  function SortIcon({col}){return<span style={{color:sortBy===col?'#6366F1':'#CBD5E1',marginLeft:4,fontSize:10}}>{sortDir==='asc'&&sortBy===col?'▲':'▼'}</span>}

  const patterns=[...new Set(cases.map(c=>c.pattern_type))];

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {/* Filters */}
      <div className="card" style={{padding:'16px 20px',marginBottom:20}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search by name or title…" style={{width:240}}/>
          <select value={sevFilter} onChange={e=>setSevFilter(e.target.value)} style={{minWidth:140}}>
            <option value="">All Severities</option>
            {Object.entries(SEV).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <select value={patFilter} onChange={e=>setPatFilter(e.target.value)} style={{minWidth:160}}>
            <option value="">All Patterns</option>
            {patterns.map(p=><option key={p} value={p}>{pLabel(p)}</option>)}
          </select>
          <select value={triageFilter} onChange={e=>setTriageFilter(e.target.value)} style={{minWidth:130}}>
            <option value="">All Triage</option>
            {['TODAY','THIS_WEEK','BACKLOG'].map(t=><option key={t} value={t}>{t.replace('_',' ')}</option>)}
          </select>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{minWidth:120}}>
            <option value="">All Status</option>
            <option value="OPEN">Open</option>
            <option value="CLOSED">Closed</option>
            <option value="SNOOZED">Snoozed</option>
          </select>
          <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:12,color:'#64748B',fontWeight:600}}>Group by:</span>
            {['none','role','severity','pattern','user'].map(g=>(
              <button key={g} onClick={()=>setGroupBy(g)} style={{padding:'6px 12px',borderRadius:7,border:'1.5px solid #E2E8F0',background:groupBy===g?'#6366F1':'#fff',color:groupBy===g?'#fff':'#64748B',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .15s'}}>
                {g==='none'?'None':g.charAt(0).toUpperCase()+g.slice(1)}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginTop:10,fontSize:12,color:'#94A3B8'}}>{filtered.length} case{filtered.length!==1?'s':''} shown</div>
      </div>

      {grouped.map(({key,items})=>(
        <div key={key} style={{marginBottom:20}}>
          {groupBy!=='none'&&(
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:'#0F172A'}}>{groupBy==='severity'?<Badge sev={key}/>:groupBy==='role'?<RoleBadge role={key}/>:key}</div>
              <span style={{fontSize:12,color:'#94A3B8'}}>{items.length} cases</span>
            </div>
          )}
          <div className="card" style={{overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table>
                <thead>
                  <tr>
                    <th onClick={()=>toggleSort('title')} style={{cursor:'pointer'}}>Title<SortIcon col="title"/></th>
                    <th>Severity</th>
                    <th>Pattern</th>
                    <th onClick={()=>toggleSort('user_name')} style={{cursor:'pointer'}}>Employee<SortIcon col="user_name"/></th>
                    <th>Role</th>
                    <th onClick={()=>toggleSort('risk_score')} style={{cursor:'pointer'}}>Risk<SortIcon col="risk_score"/></th>
                    <th onClick={()=>toggleSort('event_count')} style={{cursor:'pointer'}}>Events<SortIcon col="event_count"/></th>
                    <th>Triage</th>
                    <th>Breach</th>
                    <th onClick={()=>toggleSort('created_at')} style={{cursor:'pointer'}}>Created<SortIcon col="created_at"/></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map(c=>(
                    <tr key={c.case_id} className="clickable" onClick={()=>onCaseClick(c.case_id)}>
                      <td style={{maxWidth:200}}>
                        <div style={{fontSize:13,fontWeight:600,color:'#1E293B',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</div>
                        <div style={{fontSize:11,color:'#94A3B8',marginTop:2,fontFamily:'monospace'}}>{c.case_id?.slice(0,12)}…</div>
                      </td>
                      <td><Badge sev={c.severity}/></td>
                      <td><PatternBadge pattern={c.pattern_type}/></td>
                      <td>
                        <div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{c.user_name}</div>
                        <div style={{fontSize:11,color:'#94A3B8'}}>{c.user_id}</div>
                      </td>
                      <td><RoleBadge role={inferRole(c.user_id)}/></td>
                      <td style={{minWidth:120}}><RiskBar score={c.risk_score}/></td>
                      <td style={{fontWeight:600,color:'#475569'}}>{fmtNum(c.event_count)}</td>
                      <td><span className="badge" style={{background:TRIAGE_COLOR[c.triage_bucket]+'18',color:TRIAGE_COLOR[c.triage_bucket]||'#475569'}}>{c.triage_bucket?.replace('_',' ')}</span></td>
                      <td>{c.breach_risk?<span style={{color:'#DC2626',fontWeight:700,fontSize:13}}>⚠ Yes</span>:<span style={{color:'#94A3B8',fontSize:13}}>-</span>}</td>
                      <td style={{fontSize:12,color:'#64748B',whiteSpace:'nowrap'}}>{fmtDate(c.created_at)}</td>
                    </tr>
                  ))}
                  {items.length===0&&(
                    <tr><td colSpan={10} style={{textAlign:'center',padding:'32px 0',color:'#94A3B8',fontSize:13}}>No cases match the current filters.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Employees Page ───────────────────────────────────────────────────────────
function EmployeesPage({cases,users}){
  const [selectedRole,setSelectedRole]=useState('');

  const userMap=useMemo(()=>{
    const m={};(users||[]).forEach(u=>{m[u.user_id]=u;});return m;
  },[users]);

  const employees=useMemo(()=>{
    const m={};
    // Seed all roster users first (even those with no cases yet)
    (users||[]).forEach(u=>{
      m[u.user_id]={user_id:u.user_id,user_name:u.user_name||u.user_id,role:backendRoleToDisplay(u.role),cases:[],maxRisk:0};
    });
    cases.forEach(c=>{
      const apiUser=userMap[c.user_id];
      const role=apiUser?backendRoleToDisplay(apiUser.role):inferRole(c.user_id);
      const name=apiUser?.user_name||c.user_name||c.user_id;
      if(!m[c.user_id])m[c.user_id]={user_id:c.user_id,user_name:name,role,cases:[],maxRisk:0};
      m[c.user_id].cases.push(c);
      if(c.risk_score>m[c.user_id].maxRisk)m[c.user_id].maxRisk=c.risk_score;
    });
    return Object.values(m).sort((a,b)=>b.maxRisk-a.maxRisk);
  },[cases,users,userMap]);

  const roles=['Physician','Nursing','Billing','Administration','Other'];
  const filtered=selectedRole?employees.filter(e=>e.role===selectedRole):employees;

  function EmployeeCard({emp}){
    const openCases=emp.cases.filter(c=>c.status==='OPEN');
    const criticalCount=openCases.filter(c=>c.severity==='P0_CRITICAL').length;
    const breachCount=openCases.filter(c=>c.breach_risk).length;
    const patterns=[...new Set(openCases.map(c=>c.pattern_type))];
    const riskColor=emp.maxRisk>=80?'#DC2626':emp.maxRisk>=50?'#EA580C':emp.maxRisk>=30?'#D97706':'#16A34A';

    return(
      <div className="card" style={{padding:'18px 20px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:12,background:ROLE_COLOR[emp.role]+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:ROLE_COLOR[emp.role]}}>
              {emp.user_name?.[0]||'?'}
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'#0F172A'}}>{emp.user_name}</div>
              <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>{emp.user_id}</div>
            </div>
          </div>
          <RoleBadge role={emp.role}/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:11,color:'#64748B',fontWeight:600}}>Max Risk Score</span>
            <span style={{fontSize:12,fontWeight:700,color:riskColor}}>{emp.maxRisk}</span>
          </div>
          <RiskBar score={emp.maxRisk} color={riskColor}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
          {[{l:'Open Cases',v:openCases.length,c:'#1E293B'},{l:'Critical',v:criticalCount,c:'#DC2626'},{l:'Breach Risk',v:breachCount,c:'#EA580C'}].map(({l,v,c})=>(
            <div key={l} style={{background:'#F8FAFC',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800,color:v>0?c:'#CBD5E1'}}>{v}</div>
              <div style={{fontSize:10,color:'#94A3B8',marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        {patterns.length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {patterns.map(p=><PatternBadge key={p} pattern={p}/>)}
          </div>
        )}
      </div>
    );
  }

  const roleCounts=useMemo(()=>{
    const m={};employees.forEach(e=>m[e.role]=(m[e.role]||0)+1);return m;
  },[employees]);

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {/* Role tabs */}
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {['', ...roles.filter(r=>roleCounts[r])].map(r=>(
          <button key={r} onClick={()=>setSelectedRole(r)} style={{padding:'8px 16px',borderRadius:8,border:'1.5px solid #E2E8F0',background:selectedRole===r?'#6366F1':'#fff',color:selectedRole===r?'#fff':'#475569',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .15s'}}>
            {r||'All Departments'} {r?`(${roleCounts[r]||0})`:''}{!r?` (${employees.length})`:''}</button>
        ))}
      </div>

      {/* Role sections */}
      {(selectedRole?[selectedRole]:roles.filter(r=>roleCounts[r])).map(role=>{
        const emps=filtered.filter(e=>e.role===role);
        if(!emps.length)return null;
        return(
          <div key={role} style={{marginBottom:28}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={{width:6,height:24,borderRadius:3,background:ROLE_COLOR[role]}}/>
              <h2 style={{fontSize:15,fontWeight:700,color:'#0F172A'}}>{role}</h2>
              <span style={{fontSize:12,color:'#94A3B8'}}>{emps.length} employee{emps.length!==1?'s':''}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
              {emps.map(e=><EmployeeCard key={e.user_id} emp={e}/>)}
            </div>
          </div>
        );
      })}
      {filtered.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'#94A3B8'}}>
          <div style={{fontSize:36,marginBottom:12}}>👥</div>
          <div style={{fontSize:14}}>No employees found for this filter.</div>
        </div>
      )}
    </div>
  );
}

// ─── Ingestion Page ───────────────────────────────────────────────────────────
function IngestionPage({ingestion,onRefresh}){
  const manifests=ingestion?.manifests||[];
  const total=ingestion?.total_events_stored||0;
  const errors=ingestion?.total_parse_errors||0;
  const status=ingestion?.overall_status||'UNKNOWN';
  const statusColor={OK:'#16A34A',GAP_DETECTED:'#EA580C',PARSER_ERRORS:'#DC2626',SOURCE_UNREACHABLE:'#DC2626',UNKNOWN:'#94A3B8'}[status]||'#94A3B8';

  const timeline=useMemo(()=>[...manifests].reverse().slice(-20),[manifests]);

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {/* Status row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="⚡" label="Ingestion Status" value={status} sub="" color={statusColor}/>
        <KpiCard icon="📦" label="Total Events" value={fmtNum(total)} color="#6366F1"/>
        <KpiCard icon="❌" label="Parse Errors" value={fmtNum(errors)} color={errors>0?'#DC2626':'#16A34A'}/>
        <KpiCard icon="🔄" label="Total Runs" value={fmtNum(manifests.length)} color="#0891B2"/>
      </div>

      {/* Hashes */}
      {(ingestion?.last_success_hash||ingestion?.last_source_hash)&&(
        <div className="card" style={{padding:'16px 20px',marginBottom:20}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {[{l:'Last Manifest Hash',v:ingestion?.last_success_hash},{l:'Last Source Batch Hash',v:ingestion?.last_source_hash}].map(({l,v})=>(
              <div key={l}>
                <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>{l}</div>
                <div className="mono" style={{fontSize:12,color:'#475569',wordBreak:'break-all',background:'#F8FAFC',padding:'8px 12px',borderRadius:8,border:'1px solid #E2E8F0'}}>{v||'-'}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Timeline chart */}
      <ChartCard title="Ingestion Activity" subtitle="Events ingested per run" actions={<button className="btn-secondary" onClick={onRefresh} style={{fontSize:12,padding:'6px 12px'}}>↻ Refresh</button>} >
        {timeline.length>0
          ?<LineChart
             labels={timeline.map(m=>fmtTime(m.started_at))}
             datasets={[{
               label:'Rows Inserted',
               data:timeline.map(m=>m.inserted_count||0),
               borderColor:'#6366F1',backgroundColor:'rgba(99,102,241,.08)',fill:true,
             },{
               label:'Duplicates Skipped',
               data:timeline.map(m=>m.duplicate_count||0),
               borderColor:'#94A3B8',backgroundColor:'transparent',
             }]}/>
          :<EmptyChart message="No ingestion runs recorded"/>}
      </ChartCard>

      {/* Manifests table */}
      <div className="card" style={{marginTop:20,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid #F1F5F9'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>Ingestion Manifest History</div>
          <div style={{fontSize:12,color:'#94A3B8',marginTop:2}}>Hash-chained audit trail of every ingestion run</div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th>#</th><th>Started</th><th>Status</th><th>Source Rows</th><th>Inserted</th><th>Dupes</th><th>Gaps</th><th>Manifest Hash</th>
              </tr>
            </thead>
            <tbody>
              {manifests.slice().reverse().map(m=>(
                <tr key={m.id}>
                  <td style={{fontSize:12,color:'#94A3B8',fontFamily:'monospace'}}>{m.id}</td>
                  <td style={{fontSize:12,color:'#475569',whiteSpace:'nowrap'}}>{fmtTime(m.started_at)}</td>
                  <td>
                    <span className="badge" style={{background:m.status==='SUCCESS'?'#DCFCE7':'#FEE2E2',color:m.status==='SUCCESS'?'#166534':'#991B1B'}}>
                      {m.status}
                    </span>
                  </td>
                  <td style={{fontWeight:600,color:'#1E293B'}}>{fmtNum(m.source_row_count)}</td>
                  <td style={{fontWeight:600,color:'#16A34A'}}>{fmtNum(m.inserted_count)}</td>
                  <td style={{color:'#94A3B8'}}>{fmtNum(m.duplicate_count)}</td>
                  <td>{m.gap_detected?<span className="badge" style={{background:'#FEF9C3',color:'#854D0E'}}>GAP</span>:<span style={{color:'#94A3B8',fontSize:12}}>-</span>}</td>
                  <td><span className="mono" style={{fontSize:11,color:'#6366F1'}}>{m.manifest_hash?.slice(0,16)}…</span></td>
                </tr>
              ))}
              {manifests.length===0&&(
                <tr><td colSpan={8} style={{textAlign:'center',padding:'32px 0',color:'#94A3B8',fontSize:13}}>No ingestion runs yet.</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
