            <div style={{fontSize:20,marginBottom:8}}>{icon}</div>
            <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{l}</div>
            <div style={{fontSize:14,fontWeight:700,color:color||'#1E293B'}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Telemetry */}
      <div className="card" style={{padding:'20px 24px',marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:700,color:'#1E293B',marginBottom:14}}>Telemetry Integrity</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[{l:'Integrity Status',v:telem.stale?'⚠ Stale':'✓ OK',c:telem.stale?'#DC2626':'#16A34A'},
            {l:'Last Manifest At',v:fmtTime(telem.last_manifest_at)},
            {l:'Last Manifest Hash',v:telem.last_manifest_hash},
          ].map(({l,v,c})=>(
            <div key={l} style={{background:'#F8FAFC',borderRadius:10,padding:'12px 14px',gridColumn:l==='Last Manifest Hash'?'span 2':'auto'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>{l}</div>
              <div className={l==='Last Manifest Hash'?'mono':''} style={{fontSize:l==='Last Manifest Hash'?11:13,fontWeight:600,color:c||'#1E293B',wordBreak:'break-all'}}>{v||'-'}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Schema inspector */}
      <div className="card" style={{padding:'20px 24px'}}>
        <div style={{fontSize:14,fontWeight:700,color:'#1E293B',marginBottom:4}}>OpenEMR Schema Inspector</div>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:16}}>Tables visible to the TrustPulse connector</div>
        {loading&&<Spinner/>}
        {!loading&&schema&&(
          <>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10,marginBottom:16}}>
              {Object.entries(schema.tables||{}).map(([tbl,info])=>{
                const missing=info.missing_expected_columns||[];
                const allOk=info.exists&&missing.length===0;
                const border=!info.exists?'#FCA5A5':missing.length?'#FDE68A':'#86EFAC';
                const bg=!info.exists?'#FEF2F2':missing.length?'#FFFBEB':'#F0FDF4';
                return(
                <div key={tbl} style={{border:`1.5px solid ${border}`,borderRadius:10,padding:'12px 14px',background:bg}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span className="mono" style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{tbl}</span>
                    <StatusDot ok={allOk}/>
                  </div>
                  {!info.exists
                    ?<div style={{fontSize:11,color:'#DC2626'}}>Table not found</div>
                    :missing.length
                      ?<div style={{fontSize:11,color:'#92400E'}}>Missing: {missing.join(', ')}</div>
                      :<div style={{fontSize:11,color:'#15803D'}}>All required columns present</div>
                  }
                </div>
                );
              })}
            </div>
            {schema.limitations?.length>0&&(
              <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'12px 16px'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#92400E',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Limitations</div>
                {schema.limitations.map((l,i)=><div key={i} style={{fontSize:12,color:'#78350F',marginBottom:4}}>• {l}</div>)}
              </div>
            )}
            <div style={{marginTop:14,display:'flex',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:12,color:'#64748B'}}>Ingestion strategy:</span>
              <span className="tag">{schema.selected_ingestion_strategy||'-'}</span>
            </div>
          </>
        )}
      </div>

      {/* Governance disclaimer */}
      <div style={{marginTop:20,background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:12,padding:'16px 20px'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#92400E',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>⚖️ Important Disclaimer</div>
        <div style={{fontSize:12,color:'#78350F',lineHeight:1.6}}>
          TrustPulse is a governance decision-support tool. It does not certify HIPAA compliance, make final breach-notification determinations, or provide legal advice. All dispositions require human review by a qualified compliance officer. This tool is a proof-of-concept and is not production-hardened or HIPAA-certified.
        </div>
      </div>
    </div>
  );
}

// ─── Reports Page ────────────────────────────────────────────────────────────
function ReportsPage(){
  const [schedules,setSchedules]=useState([]);
  const [history,setHistory]=useState([]);
  const [loading,setLoading]=useState(false);
  const [runLoading,setRunLoading]=useState(false);
  const [msg,setMsg]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:'',frequency:'WEEKLY',include_period_days:7,recipient_email:'',customPeriod:false});
  const [emailRow,setEmailRow]=useState(null);
  const [emailAddr,setEmailAddr]=useState('');

  async function load(){
    setLoading(true);
    try{
      const [s,h]=await Promise.all([
        apiFetch('/api/reports/schedules'),
        apiFetch('/api/reports/history?limit=20'),
      ]);
      if(s)setSchedules(s.schedules||[]);
      if(h)setHistory(h.runs||[]);
    }catch{}
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function runAdhoc(){
    setRunLoading(true);setMsg(null);
    try{
      const r=await apiFetch('/api/reports/run',{method:'POST',body:{period_days:7,report_type:'ADHOC'}});
      if(r&&r.status==='SUCCESS'){
        setMsg({ok:true,text:`Report generated (${(r.file_size_bytes/1024).toFixed(1)} KB). Opening…`});
        await load();
        viewReport(r.run_id);
      }else{
        setMsg({ok:false,text:r?.detail||'Generation failed'});
      }
    }catch(e){setMsg({ok:false,text:String(e)});}
    setRunLoading(false);
  }

  async function createSchedule(){
    setMsg(null);
    try{
      const body={
        name:form.name,
        frequency:form.frequency,
        frequency_days:form.frequency==='CUSTOM'?parseInt(form.include_period_days,10)||7:7,
        include_period_days:parseInt(form.include_period_days,10)||7,
        recipient_email:form.recipient_email||null,
      };
      await apiFetch('/api/reports/schedules',{method:'POST',body});
      setShowForm(false);
      setMsg({ok:true,text:'Schedule created.'});
      await load();
    }catch(e){setMsg({ok:false,text:String(e)});}
  }

  async function deleteSchedule(id){
    if(!confirm('Delete this schedule?'))return;
    await apiFetch(`/api/reports/schedules/${id}`,{method:'DELETE'});
    await load();
  }

  async function runSchedule(id){
    setRunLoading(true);setMsg(null);
    try{
      const r=await apiFetch('/api/reports/run',{method:'POST',body:{schedule_id:id,period_days:7,report_type:'ADHOC'}});
      if(r&&r.status==='SUCCESS'){
        setMsg({ok:true,text:'Report generated. Opening…'});
        await load();
        viewReport(r.run_id);
      }
    }catch(e){setMsg({ok:false,text:String(e)});}
    setRunLoading(false);
  }

  async function sendEmail(runId,addr){
    if(!addr||!addr.includes('@')){setMsg({ok:false,text:'Enter a valid email address.'});return;}
    try{
      await apiFetch(`/api/reports/history/${runId}/send`,{method:'POST',body:{to:addr}});
      setMsg({ok:true,text:`Report emailed to ${addr}.`});
      setEmailRow(null);setEmailAddr('');
    }catch(e){setMsg({ok:false,text:String(e)});}
  }

  const freqColors={WEEKLY:'#6366F1',MONTHLY:'#0284C7',QUARTERLY:'#059669',CUSTOM:'#9333EA',ADHOC:'#64748B'};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:'#F8FAFC'}}>

      {/* Top bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <div style={{fontWeight:700,fontSize:18,color:'#0F172A'}}>Governance Reports</div>
          <div style={{fontSize:12,color:'#64748B',marginTop:2}}>Generate HIPAA audit-governance reports - download as HTML/PDF</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-outline" onClick={()=>{setShowForm(f=>!f);setForm({name:'',frequency:'WEEKLY',include_period_days:7,recipient_email:'',customPeriod:false});}}>+ New Schedule</button>
          <button className="btn-primary" onClick={runAdhoc} disabled={runLoading}>
            {runLoading?'Generating…':'▶ Run Ad-hoc Report'}
          </button>
        </div>
      </div>

      {msg&&(
        <div style={{background:msg.ok?'#DCFCE7':'#FEE2E2',color:msg.ok?'#166534':'#991B1B',
                     borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:13}}>
          {msg.text}
        </div>
      )}

      {/* Create-schedule form */}
      {showForm&&(()=>{
        const PRESETS=[
          {f:'WEEKLY',   days:7,   emoji:'📅', label:'Weekly',    run:'Runs every 7 days',        cover:'Last 7 days of audit events',   accent:'#6366F1', bg:'#EEF2FF'},
          {f:'MONTHLY',  days:30,  emoji:'📆', label:'Monthly',   run:'Runs every 30 days',       cover:'Last 30 days of audit events',  accent:'#0284C7', bg:'#E0F2FE'},
          {f:'QUARTERLY',days:90,  emoji:'🗓', label:'Quarterly', run:'Runs every 90 days',       cover:'Last 90 days of audit events',  accent:'#059669', bg:'#DCFCE7'},
          {f:'CUSTOM',   days:14,  emoji:'⚙️', label:'Custom',    run:'You set the interval',     cover:'You set the window',            accent:'#9333EA', bg:'#F5F3FF'},
        ];
        const isCustom=form.frequency==='CUSTOM';
        const preset=PRESETS.find(p=>p.f===form.frequency)||PRESETS[0];
        const defaultDays={WEEKLY:7,MONTHLY:30,QUARTERLY:90};
        const inputBase={width:'100%',padding:'10px 14px',border:'1.5px solid #E2E8F0',borderRadius:10,
                         fontSize:14,color:'#0F172A',outline:'none',boxSizing:'border-box',background:'#fff'};
        const labelStyle={fontSize:11,fontWeight:700,color:'#64748B',display:'block',
                          marginBottom:7,textTransform:'uppercase',letterSpacing:'.06em'};
        return(
          <div style={{background:'#fff',border:'1px solid #E2E8F0',borderRadius:16,padding:28,
                       marginBottom:24,boxShadow:'0 4px 24px rgba(15,23,42,.07)'}}>

            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
              <div>
                <div style={{fontWeight:700,fontSize:16,color:'#0F172A'}}>New Report Schedule</div>
                <div style={{fontSize:12,color:'#64748B',marginTop:3}}>
                  Frequency and coverage are always kept in sync - no mismatch possible.
                </div>
              </div>
              <button onClick={()=>setShowForm(false)}
                style={{background:'none',border:'none',cursor:'pointer',color:'#94A3B8',
                        fontSize:20,lineHeight:1,padding:'0 2px'}}>✕</button>
            </div>

            {/* Schedule name */}
            <div style={{marginBottom:22}}>
              <label style={labelStyle}>Schedule Name</label>
              <input style={inputBase} placeholder="e.g. Weekly HIPAA Audit Report"
                value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            </div>

            {/* Frequency cards */}
            <div style={{marginBottom:22}}>
              <label style={labelStyle}>Frequency & Default Coverage</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
                {PRESETS.map(opt=>{
                  const sel=form.frequency===opt.f;
                  return(
                    <div key={opt.f}
                      onClick={()=>setForm(f=>({...f,frequency:opt.f,include_period_days:opt.days,customPeriod:opt.f==='CUSTOM'}))}
                      style={{border:`2px solid ${sel?opt.accent:'#E2E8F0'}`,borderRadius:14,padding:'18px 16px',
                              cursor:'pointer',background:sel?opt.bg:'#FAFAFA',
                              transition:'border-color .15s,background .15s',
                              boxShadow:sel?`0 0 0 4px ${opt.accent}18`:'none'}}>
                      <div style={{fontSize:24,marginBottom:8}}>{opt.emoji}</div>
                      <div style={{fontWeight:700,fontSize:15,color:sel?opt.accent:'#0F172A',marginBottom:3}}>
                        {opt.label}
                      </div>
                      <div style={{fontSize:11,color:'#64748B',marginBottom:10}}>{opt.run}</div>
                      <div style={{fontSize:11,fontWeight:600,
                                   color:sel?opt.accent:'#64748B',
                                   background:sel?`${opt.accent}18`:'#F1F5F9',
                                   borderRadius:6,padding:'5px 9px',display:'inline-block'}}>
                        {opt.cover}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Coverage window */}
            <div style={{marginBottom:22,borderRadius:12,padding:'14px 16px',
                         background:isCustom?'#F5F3FF':'#F8FAFC',
                         border:`1px solid ${isCustom?'#D8B4FE':'#E2E8F0'}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:isCustom?14:0}}>
                <span style={{fontSize:13,fontWeight:700,color:isCustom?'#9333EA':'#94A3B8'}}>
                  Customize coverage window
                </span>
                {!isCustom&&(
                  <span style={{fontSize:11,color:'#94A3B8',fontStyle:'italic'}}>
                    - locked to {defaultDays[form.frequency]} days for {form.frequency.toLowerCase()} schedules.
                    Select <b>Custom</b> to set a different window.
                  </span>
                )}
              </div>

              {isCustom&&(
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
                    <input type="range" min={1} max={365} value={form.include_period_days}
                      onChange={e=>setForm(f=>({...f,include_period_days:parseInt(e.target.value)}))}
                      style={{flex:1,accentColor:'#9333EA',height:4}}/>
                    <div style={{minWidth:72,background:'#fff',border:'1.5px solid #D8B4FE',borderRadius:8,
                                 padding:'6px 10px',textAlign:'center',fontSize:14,fontWeight:700,color:'#9333EA'}}>
                      {form.include_period_days}d
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {[7,14,30,60,90,180].map(d=>(
                      <button key={d} onClick={()=>setForm(f=>({...f,include_period_days:d}))}
                        style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',
                                border:`1.5px solid ${form.include_period_days===d?'#9333EA':'#E2E8F0'}`,
                                background:form.include_period_days===d?'#9333EA':'#fff',
                                color:form.include_period_days===d?'#fff':'#64748B'}}>
                        {d}d
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Recipient email */}
            <div style={{marginBottom:22}}>
              <label style={labelStyle}>
                Recipient Email
                <span style={{fontWeight:400,fontSize:10,textTransform:'none',letterSpacing:0,
                              color:'#94A3B8',marginLeft:6}}>optional - emailed after each run</span>
              </label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',
                              fontSize:15,color:'#94A3B8',pointerEvents:'none'}}>✉</span>
                <input type="email" style={{...inputBase,paddingLeft:36}}
                  placeholder="compliance@clinic.example"
                  value={form.recipient_email}
                  onChange={e=>setForm(f=>({...f,recipient_email:e.target.value}))}/>
              </div>
            </div>

            {/* Live preview */}
            <div style={{background:preset.bg,border:`1px solid ${preset.accent}40`,borderRadius:12,
                         padding:'16px 18px',marginBottom:22}}>
              <div style={{fontSize:10,fontWeight:800,color:preset.accent,textTransform:'uppercase',
                           letterSpacing:'.08em',marginBottom:8}}>Schedule Preview</div>
              <div style={{fontSize:13,color:'#0F172A',lineHeight:1.7}}>
                <span style={{fontWeight:700}}>{form.name||'(unnamed schedule)'}</span>
                {' '}will run{' '}
                <span style={{fontWeight:700,color:preset.accent}}>
                  {isCustom?`every ${form.include_period_days} days (custom)`:preset.run.toLowerCase()}
                </span>
                {' '}and each report will cover the last{' '}
                <span style={{fontWeight:700,color:preset.accent}}>{form.include_period_days} days</span>
                {' '}of audit events.
                {form.recipient_email&&(
                  <span> A copy will be emailed to{' '}
                    <span style={{fontWeight:700}}>{form.recipient_email}</span>.
                  </span>
                )}
              </div>
            </div>

            {/* Actions */}
            <div style={{display:'flex',gap:10}}>
              <button className="btn-primary" onClick={createSchedule}
                style={{padding:'10px 24px',fontSize:14}}>
                Create Schedule
              </button>
              <button className="btn-outline" onClick={()=>setShowForm(false)}
                style={{padding:'10px 20px',fontSize:14}}>
                Cancel
              </button>
            </div>

          </div>
        );
      })()}

      {/* Schedules */}
      <div style={{background:'#fff',border:'1px solid #E2E8F0',borderRadius:12,marginBottom:24,overflow:'hidden'}}>
        <div style={{padding:'13px 24px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',
                     fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'#475569'}}>
          Scheduled Reports
        </div>
        {schedules.length===0?(
          <div style={{padding:32,textAlign:'center',color:'#94A3B8',fontSize:13}}>
            No schedules yet - create one above or run an ad-hoc report.
          </div>
        ):(
          <table>
            <thead>
              <tr>
                <th>Name</th><th>Frequency</th><th>Coverage</th><th>Sync</th>
                <th>Recipient</th><th>Last Run</th><th>Next Run</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {schedules.map(s=>{
                const defaultDays={WEEKLY:7,MONTHLY:30,QUARTERLY:90};
                const synced=s.frequency==='CUSTOM'||s.include_period_days===defaultDays[s.frequency];
                return(
                <tr key={s.id}>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  <td>
                    <span style={{background:freqColors[s.frequency]||'#64748B',color:'#fff',
                                  padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700}}>
                      {s.frequency}
                    </span>
                  </td>
                  <td style={{fontSize:12,color:'#64748B'}}>Last {s.include_period_days} days</td>
                  <td>
                    <span title={synced?'Coverage matches frequency':'Coverage window differs from run interval'}
                      style={{fontSize:13}}>{synced?'✅':'⚠️'}</span>
                  </td>
                  <td style={{fontSize:12,color:'#64748B'}}>{s.recipient_email||'-'}</td>
                  <td style={{fontSize:11,color:'#94A3B8'}}>{s.last_run_at?new Date(s.last_run_at).toLocaleDateString():'Never'}</td>
                  <td style={{fontSize:11,color:'#94A3B8'}}>{s.next_run_at?new Date(s.next_run_at).toLocaleDateString():'-'}</td>
                  <td>
                    <span style={{background:s.is_active?'#DCFCE7':'#F1F5F9',
                                  color:s.is_active?'#166534':'#64748B',
                                  padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700}}>
                      {s.is_active?'ACTIVE':'PAUSED'}
                    </span>
                  </td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn-outline" style={{padding:'3px 10px',fontSize:11}}
                        onClick={()=>runSchedule(s.id)} disabled={runLoading}>Run Now</button>
                      <button style={{background:'#FEE2E2',color:'#991B1B',border:'none',borderRadius:6,
                                     padding:'3px 10px',fontSize:11,cursor:'pointer'}}
                        onClick={()=>deleteSchedule(s.id)}>Delete</button>
                    </div>
                  </td>
                </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* History */}
      <div style={{background:'#fff',border:'1px solid #E2E8F0',borderRadius:12,overflow:'hidden'}}>
        <div style={{padding:'13px 24px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',
                     fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'#475569'}}>
          Report History
        </div>
        {loading&&history.length===0?(
          <div style={{padding:32,textAlign:'center',color:'#94A3B8'}}>Loading…</div>
        ):history.length===0?(
          <div style={{padding:32,textAlign:'center',color:'#94A3B8',fontSize:13}}>No reports generated yet.</div>
        ):(
          <table>
            <thead>
              <tr>
                <th>Type</th><th>Schedule</th><th>Period</th><th>Generated At</th>
                <th>By</th><th>Size</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {history.map(r=>(
                <tr key={r.id}>
                  <td>
                    <span style={{background:freqColors[r.report_type]||'#64748B',color:'#fff',
                                  padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700}}>
                      {r.report_type}
                    </span>
                  </td>
                  <td style={{fontSize:12}}>{r.schedule_name||'-'}</td>
                  <td style={{fontSize:12,color:'#64748B'}}>{r.period_days}d</td>
                  <td style={{fontSize:11,color:'#64748B'}}>
                    {r.generated_at?new Date(r.generated_at).toLocaleString():'-'}
                  </td>
                  <td style={{fontSize:11,color:'#64748B'}}>{r.generated_by}</td>
                  <td style={{fontSize:11,color:'#94A3B8'}}>
                    {r.file_size_bytes?`${(r.file_size_bytes/1024).toFixed(1)} KB`:'-'}
                  </td>
                  <td>
                    <span style={{background:r.status==='SUCCESS'?'#DCFCE7':r.status==='FAILED'?'#FEE2E2':'#FEF9C3',
                                  color:r.status==='SUCCESS'?'#166534':r.status==='FAILED'?'#991B1B':'#854D0E',
                                  padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700}}>
                      {r.status}
                    </span>
                  </td>
                  <td>
                    {r.status==='SUCCESS'&&(
                      <div>
                        <div style={{display:'flex',gap:4}}>
                          <button className="btn-outline" style={{padding:'3px 8px',fontSize:11}}
                            onClick={()=>viewReport(r.id)}>View</button>
                          <button className="btn-outline" style={{padding:'3px 8px',fontSize:11}}
                            onClick={()=>downloadPdf(r.id)}>Save PDF</button>
                          <button className="btn-outline" style={{padding:'3px 8px',fontSize:11}}
                            onClick={()=>{setEmailRow(emailRow===r.id?null:r.id);setEmailAddr('');}}>
                            Email
                          </button>
                        </div>
                        {emailRow===r.id&&(
                          <div style={{display:'flex',gap:4,marginTop:5}}>
                            <input type="email" placeholder="recipient@example.com"
                              style={{padding:'3px 8px',border:'1px solid #CBD5E1',borderRadius:6,fontSize:11,width:170}}
                              value={emailAddr} onChange={e=>setEmailAddr(e.target.value)}
                              onKeyDown={e=>e.key==='Enter'&&sendEmail(r.id,emailAddr)}/>
                            <button className="btn-primary" style={{padding:'3px 10px',fontSize:11}}
                              onClick={()=>sendEmail(r.id,emailAddr)}>Send</button>
                            <button className="btn-outline" style={{padding:'3px 6px',fontSize:11}}
                              onClick={()=>setEmailRow(null)}>✕</button>
                          </div>
                        )}
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

    </div>
  );
}

        <div style={{fontSize:12,color:'#4338CA',lineHeight:1.6}}>
          TrustPulse uses role-based access control with four built-in roles. Roles are assigned per user - a user belongs to exactly one role.

          User Group layering (multiple roles per user, query-scoped access) is a planned future capability.

function AdminSettingsPage(){
  const [settings,setSettings]=useState({});
  const [form,setForm]=useState({});
  const [msg,setMsg]=useState(null);
  const [testing,setTesting]=useState(false);
  const [testResult,setTestResult]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    apiFetch('/api/admin/settings').then(d=>{
      setSettings(d||{});
      const vals={};
      Object.entries(d||{}).forEach(([k,v])=>vals[k]=v.value||'');
      setForm(vals);
    }).catch(()=>{});
  },[]);

  const flash=(m,ok=true)=>{setMsg({m,ok});setTimeout(()=>setMsg(null),4000);};

  const testConn=async()=>{
    setTesting(true);setTestResult(null);
    try{
      const r=await apiFetch('/api/admin/settings/test-connection',{method:'POST',body:{openemr_db_url:form.openemr_db_url}});
      setTestResult(r?.connected?'success':'fail');
      if(!r?.connected) flash('Connection failed - check the URL and credentials',false);
      else flash('Connection successful');
    }catch(e){setTestResult('fail');flash('Connection failed: '+(e?.message||'unknown error'),false);}
    finally{setTesting(false);}
  };

  const save=async()=>{
    setSaving(true);
    try{
      const r=await apiFetch('/api/admin/settings',{method:'PUT',body:form});
      if(r?.saved){
        flash('Settings saved');
        if(r.saved.includes('openemr_db_url')){
          apiFetch('/api/admin/settings/apply-connection',{method:'POST'})
            .then(x=>x?.connected&&flash('OpenEMR connector reconnected'))
            .catch(()=>{});
        }
      } else flash('Save failed',false);
    }catch(e){flash('Save failed: '+(e?.message||'unknown error'),false);}
    finally{setSaving(false);}
  };

  const FIELD_META={
    openemr_db_url:            {label:'OpenEMR Database URL',hint:'Full connection string including credentials',type:'password',full:true},
    clinic_name:               {label:'Clinic / Facility Name',hint:'Shown in generated governance reports'},
    ingestion_interval_seconds:{label:'Ingestion Interval (seconds)',hint:'How often TrustPulse polls OpenEMR audit logs',type:'number'},
  };

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {msg&&<div style={{marginBottom:16,padding:'10px 16px',borderRadius:8,background:msg.ok?'#F0FDF4':'#FEF2F2',border:`1px solid ${msg.ok?'#86EFAC':'#FCA5A5'}`,color:msg.ok?'#15803D':'#DC2626',fontSize:13}}>{msg.m}</div>}

      <div className="card" style={{padding:'22px 26px',marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:700,color:'#1E293B',marginBottom:4}}>OpenEMR Connection &amp; Configuration</div>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:20}}>Changes are saved to TrustPulse's internal settings and applied immediately to the connector - no container restart required.</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {Object.entries(FIELD_META).map(([key,meta])=>(
            <div key={key} style={{gridColumn:meta.full?'span 2':'auto'}}>
              <label style={{fontSize:11,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:6}}>{meta.label}</label>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input
                  className="input"
                  type={meta.type==='password'?'text':meta.type||'text'}
                  style={{fontFamily:meta.type==='password'?'monospace':'inherit',fontSize:12,flex:1}}

                  onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
                />
                {key==='openemr_db_url'&&(
                  <button
                    onClick={testConn}
                    disabled={testing||!form.openemr_db_url}
                    style={{padding:'8px 14px',borderRadius:8,border:'1px solid #E2E8F0',background:testResult==='success'?'#F0FDF4':testResult==='fail'?'#FEF2F2':'#F8FAFC',color:testResult==='success'?'#15803D':testResult==='fail'?'#DC2626':'#475569',cursor:'pointer',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>
                    {testing?'Testing…':testResult==='success'?'✓ OK':testResult==='fail'?'✗ Failed':'Test Connection'}
                  </button>
                )}
              </div>
              <div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>{meta.hint}</div>
            </div>
          ))}
        </div>

        <div style={{marginTop:20,display:'flex',gap:10,alignItems:'center'}}>
          <button className="btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save Settings'}</button>
          <span style={{fontSize:11,color:'#94A3B8'}}>Saves to TrustPulse DB and reconnects the OpenEMR connector immediately.</span>
        </div>
      </div>

      <div className="card" style={{padding:'18px 22px'}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1E293B',marginBottom:12}}>Read-Only Settings</div>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:12}}>These are set via environment variables at container start and cannot be changed without a restart.</div>
        {[
          {k:'TRUSTPULSE_BULK_ACCESS_THRESHOLD',l:'Cold-Start Bulk Access Threshold (R-02)',hint:'Unique patients/day threshold during COLD_START and TRAINING phases'},
          {k:'TRUSTPULSE_VOLUME_SPIKE_THRESHOLD',l:'Cold-Start Volume Spike Threshold (R-08)',hint:'Total events/day threshold during cold-start phases'},
          {k:'TRUSTPULSE_MODE',l:'Runtime Mode',hint:'openemr_real = live connector'},
          {k:'TRUSTPULSE_JWT_SECRET',l:'JWT Secret',hint:'Token signing key - set in .env'},
          {k:'TRUSTPULSE_PATIENT_TOKEN_SECRET',l:'Patient Token HMAC Secret',hint:'Key for one-way patient ID tokenisation'},
        ].map(({k,l,hint})=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'9px 0',borderBottom:'1px solid #F1F5F9'}}>

function AdminPrivacyPage(){
  const [config,setConfig]=useState({module_enabled:false,obfuscated_fields:[],maskable_fields:{}});
  const [requests,setRequests]=useState([]);
  const [msg,setMsg]=useState(null);
  const [saving,setSaving]=useState(false);

  const load=()=>{
    apiFetch('/api/admin/privacy/config').then(d=>setConfig(d||{})).catch(()=>{});
    apiFetch('/api/admin/privacy/requests').then(d=>setRequests(d?.requests||[])).catch(()=>{});
  };
  useEffect(()=>{load();},[]);

  const flash=(m,ok=true)=>{setMsg({m,ok});setTimeout(()=>setMsg(null),3500);};

  const toggleField=async(field)=>{
    const cur=config.obfuscated_fields||[];
    const next=cur.includes(field)?cur.filter(f=>f!==field):[...cur,field];
    const r=await apiFetch('/api/admin/privacy/config',{method:'PUT',body:{module_enabled:config.module_enabled,obfuscated_fields:next}});
    if(r){setConfig(c=>({...c,obfuscated_fields:next}));flash('Fields updated');}
    else flash('Update failed',false);
  };

  const toggleModule=async()=>{
    const next=!config.module_enabled;
    setSaving(true);
    const r=await apiFetch('/api/admin/privacy/config',{method:'PUT',body:{module_enabled:next,obfuscated_fields:config.obfuscated_fields||[]}});
    setSaving(false);
    if(r){setConfig(c=>({...c,module_enabled:next}));flash(`Data Privacy ${next?'enabled':'disabled'}`);}
    else flash('Update failed',false);
  };

  const decide=async(id,decision,denied_reason='')=>{
    const r=await apiFetch(`/api/admin/privacy/requests/${id}/decide`,{method:'PATCH',body:{decision,denied_reason}});
    if(r){flash(`Request ${decision.toLowerCase()}`);load();}
    else flash('Action failed',false);
  };

  const statusColor={PENDING:'#92400E',APPROVED:'#15803D',DENIED:'#DC2626',EXPIRED:'#94A3B8'};
  const statusBg={PENDING:'#FFFBEB',APPROVED:'#F0FDF4',DENIED:'#FEF2F2',EXPIRED:'#F8FAFC'};
  const pending=requests.filter(r=>r.status==='PENDING');
  const history=requests.filter(r=>r.status!=='PENDING');

  return(
    <div className="fade" style={{padding:28,overflow:'auto',flex:1}}>
      {msg&&<div style={{marginBottom:16,padding:'10px 16px',borderRadius:8,background:msg.ok?'#F0FDF4':'#FEF2F2',border:`1px solid ${msg.ok?'#86EFAC':'#FCA5A5'}`,color:msg.ok?'#15803D':'#DC2626',fontSize:13}}>{msg.m}</div>}

      {/* Module toggle */}
      <div className="card" style={{padding:'20px 24px',marginBottom:20,borderLeft:`4px solid ${config.module_enabled?'#6366F1':'#E2E8F0'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>Data Privacy Module</div>
            <div style={{fontSize:12,color:'#64748B',marginTop:4,maxWidth:560,lineHeight:1.6}}>
              When enabled, selected log fields are masked for users without approved access.
              Users can request access to view protected values. Access must be explicitly authorised by an administrator before any masked value is revealed.
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,flexShrink:0,marginLeft:20}}>
            <button onClick={toggleModule} disabled={saving} style={{padding:'8px 20px',borderRadius:8,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,background:config.module_enabled?'#EF4444':'#6366F1',color:'#fff'}}>
              {config.module_enabled?'Disable':'Enable'}
            </button>
            <span style={{fontSize:11,fontWeight:700,color:config.module_enabled?'#15803D':'#94A3B8'}}>
              {config.module_enabled?'● Active':'○ Inactive'}
            </span>
          </div>
        </div>
      </div>

      {/* Field selection */}
      <div className="card" style={{padding:'20px 24px',marginBottom:20,opacity:config.module_enabled?1:.5,pointerEvents:config.module_enabled?'auto':'none'}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1E293B',marginBottom:4}}>Fields to Obfuscate</div>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:16}}>Selected fields are replaced with ●●●●●●●● for users without approved access.</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {Object.entries(config.maskable_fields||{}).map(([field,label])=>{
            const on=(config.obfuscated_fields||[]).includes(field);
            return(
              <div key={field} onClick={()=>toggleField(field)} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderRadius:10,border:`2px solid ${on?'#6366F1':'#E2E8F0'}`,background:on?'#EEF2FF':'#F8FAFC',cursor:'pointer',transition:'all .15s'}}>
                <div style={{width:20,height:20,borderRadius:6,background:on?'#6366F1':'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:12,color:'#fff',fontWeight:700}}>
                  {on?'✓':''}
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{label}</div>
                  <div style={{fontSize:11,color:'#94A3B8',fontFamily:'monospace'}}>{field}</div>
                </div>
                {on&&<span style={{marginLeft:'auto',fontSize:11,color:'#6366F1',fontWeight:700}}>Masked</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Pending requests */}
      <div className="card" style={{padding:'20px 24px',marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>Pending Access Requests</div>
            <div style={{fontSize:12,color:'#94A3B8',marginTop:2}}>Users requesting access to view protected field values.</div>
          </div>
          {pending.length>0&&<span style={{background:'#FEF3C7',color:'#92400E',borderRadius:99,padding:'2px 10px',fontSize:11,fontWeight:700}}>{pending.length} pending</span>}
        </div>
        {pending.length===0
          ?<div style={{fontSize:12,color:'#94A3B8',fontStyle:'italic'}}>No pending requests.</div>
          :pending.map(r=>(
            <div key={r.id} style={{border:'1px solid #FDE68A',borderRadius:10,padding:'14px 16px',marginBottom:10,background:'#FFFBEB'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div>
                  <span style={{fontWeight:700,color:'#1E293B',fontSize:13}}>{r.requester_email}</span>
                  <span style={{marginLeft:8,fontSize:11,color:'#92400E',background:'#FEF3C7',borderRadius:6,padding:'1px 6px'}}>{r.requester_role?.replace(/_/g,' ')}</span>
                </div>
                <span style={{fontSize:11,color:'#94A3B8'}}>{fmtTime(r.created_at)}</span>
              </div>
              <div style={{fontSize:12,color:'#475569',marginBottom:12,fontStyle:'italic'}}>"{r.reason}"</div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-primary" style={{fontSize:12,padding:'6px 16px'}} onClick={()=>decide(r.id,'APPROVED')}>Approve (24h)</button>
                <button onClick={()=>{const reason=prompt('Reason for denial (optional):');decide(r.id,'DENIED',reason||'');}} style={{fontSize:12,padding:'6px 16px',borderRadius:8,border:'1px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',cursor:'pointer',fontWeight:600}}>Deny</button>
              </div>
            </div>
          ))
        }
      </div>

      {/* History */}
      {history.length>0&&(
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',fontSize:13,fontWeight:700,color:'#1E293B',borderBottom:'1px solid #F1F5F9'}}>Access Request History</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['User','Status','Granted By','Expires','Reason'].map(h=>(
                  <th key={h} style={{padding:'8px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:'#64748B',textTransform:'uppercase',letterSpacing:'.06em'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {history.map(r=>(
                <tr key={r.id} style={{borderBottom:'1px solid #F1F5F9'}}>
                  <td style={{padding:'10px 14px',fontWeight:600}}>{r.requester_email}</td>
                  <td style={{padding:'10px 14px'}}>
                    <span style={{background:statusBg[r.status]||'#F8FAFC',color:statusColor[r.status]||'#94A3B8',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700}}>{r.status}</span>
                  </td>
                  <td style={{padding:'10px 14px',color:'#64748B'}}>{r.granted_by||'-'}</td>
                  <td style={{padding:'10px 14px',color:'#64748B',fontSize:11}}>{r.expires_at?fmtTime(r.expires_at):'-'}</td>
                  <td style={{padding:'10px 14px',color:'#64748B',fontStyle:'italic',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.reason}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(getSavedUser);
  const [page,setPage]=useState('dashboard');
  const [cases,setCases]=useState([]);
  const [users,setUsers]=useState([]);
  const [ingestion,setIngestion]=useState(null);
  const [system,setSystem]=useState(null);
  const [loadingData,setLoadingData]=useState(false);
  const [drawerCase,setDrawerCase]=useState(null);
  const pollRef=useRef(null);

  function onLogin(token,u){setToken(token);saveUser(u);setUser(u)}
  function onLogout(){setToken(null);saveUser(null);setUser(null)}

  async function fetchAll(){
    setLoadingData(true);
    try{
      const [c,i,s,u]=await Promise.all([
        apiFetch('/api/cases'),
        apiFetch('/api/ingestion/status'),
        apiFetch('/api/system/status'),
        apiFetch('/api/users'),
      ]);
      if(c)setCases(c.cases||[]);
      if(i)setIngestion(i);
      if(s)setSystem(s);
      if(u)setUsers(Array.isArray(u)?u:[]);
    }catch{}
    setLoadingData(false);
  }

  useEffect(()=>{
    if(!user)return;
    fetchAll();
    pollRef.current=setInterval(()=>fetchAll(),60000);
    return()=>clearInterval(pollRef.current);
  },[user]);

  if(!user)return <LoginPage onLogin={onLogin}/>;

  const connected=system?.openemr_connection?.connected||false;
  const pageTitles={
    dashboard:         {title:'Dashboard',subtitle:'Real-time governance overview from live OpenEMR audit logs'},
    cases:             {title:'Review Case Queue',subtitle:`${cases.filter(c=>c.status==='OPEN').length} open cases requiring review`},
    employees:         {title:'Access Review Profiles',subtitle:'Access patterns grouped by role and user'},
    ingestion:         {title:'Ingestion & Telemetry',subtitle:'Hash-chained ingestion manifest history'},
    reports:           {title:'Governance Reports',subtitle:'Generate, schedule, and download HIPAA audit-governance reports'},
    system:            {title:'System Connection',subtitle:'OpenEMR connector status and schema inspection'},
    admin_users:       {title:'Users',subtitle:'Manage TrustPulse platform accounts'},
    admin_permissions: {title:'Permission Groups',subtitle:'Role capabilities and access control matrix'},
    admin_privacy:     {title:'Data Privacy',subtitle:'Field masking, access requests and approval workflow'},
    admin_settings:    {title:'Settings',subtitle:'OpenEMR connection and runtime configuration'},
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={onLogout} casesCount={cases.filter(c=>c.status==='OPEN').length}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Header title={pageTitles[page]?.title||''} subtitle={pageTitles[page]?.subtitle||''} connected={connected}/>
        {loadingData&&cases.length===0&&<Spinner/>}
        {page==='dashboard'&&<DashboardPage cases={cases} ingestion={ingestion} system={system} setPage={setPage}/>}
        {page==='cases'&&<CasesPage cases={cases} user={user} onCaseClick={id=>setDrawerCase(id)}/>}
        {page==='employees'&&<EmployeesPage cases={cases} users={users}/>}
        {page==='ingestion'&&<IngestionPage ingestion={ingestion} onRefresh={fetchAll}/>}
        {page==='reports'&&<ReportsPage/>}
        {page==='system'&&<SystemPage system={system}/>}
        {page==='admin_users'&&<AdminUsersPage/>}
        {page==='admin_permissions'&&<AdminPermissionsPage/>}
        {page==='admin_privacy'&&<AdminPrivacyPage/>}
        {page==='admin_settings'&&<AdminSettingsPage/>}
      </div>
      {drawerCase&&(
        <CaseDrawer
          caseId={drawerCase}
          user={user}
          onClose={()=>setDrawerCase(null)}
          onDisposed={()=>fetchAll()}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
